<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="nav" id="main-nav"></nav>

  <div class="page">
    <header class="hero">
      <div class="hero-inner">
        <p class="hero-eyebrow" id="hero-role"></p>
        <h1 id="hero-headline"></h1>
        <p class="hero-bio" id="hero-bio"></p>
        <div class="hero-ctas">
          <a href="thoughts.html" class="btn-primary">Read my thoughts &#8594;</a>
          <a href="portfolio.html" class="btn-ghost">See my work</a>
        </div>
      </div>
    </header>

    <section class="section" style="border-top:1px solid var(--border)">
      <div class="section-wrap">
        <div class="section-header">
          <div>
            <p class="section-label fade-in">Latest Writing</p>
            <h2 class="section-title fade-in">Recent Thoughts</h2>
          </div>
          <a href="thoughts.html" class="btn-ghost fade-in">All posts &#8594;</a>
        </div>
        <div class="posts-list" id="home-posts"></div>
      </div>
    </section>

    <section class="section" style="background:var(--paper-warm);border-top:1px solid var(--border)">
      <div class="section-wrap">
        <div class="section-header">
          <div>
            <p class="section-label fade-in">Selected Work</p>
            <h2 class="section-title fade-in">Projects</h2>
          </div>
          <a href="portfolio.html" class="btn-ghost fade-in">All projects &#8594;</a>
        </div>
        <div class="projects-grid" id="home-projects"></div>
      </div>
    </section>
  </div>

  <footer class="footer" id="main-footer"></footer>

  <script src="js/cms.js"></script>
  <script src="js/main.js"></script>
  <script>
    buildNav('home');

    document.addEventListener('DOMContentLoaded', function () {
      var p = CMS.getProfile();
      document.title = p.name + ' — ' + p.role;

      document.getElementById('hero-role').textContent = p.role;
      document.getElementById('hero-headline').innerHTML = p.tagline + '<br><em>' + p.taglineEm + '</em>';
      document.getElementById('hero-bio').textContent = p.bio;

      // Latest 3 posts
      var posts = CMS.getPosts().slice(0, 3);
      var postsCont = document.getElementById('home-posts');
      if (!posts || posts.length === 0) {
        postsCont.innerHTML = '<p style="color:var(--ink-faint);font-size:.9rem;padding:24px 0">No posts yet.</p>';
      } else {
        postsCont.innerHTML = posts.map(function(post) {
          return '<a class="post-card fade-in" href="post.html?id=' + post.id + '">' +
            '<div>' +
              '<span class="post-tag">' + (post.tag || '') + '</span>' +
              '<h3 class="post-title">' + post.title + '</h3>' +
              '<p class="post-excerpt">' + post.excerpt + '</p>' +
            '</div>' +
            '<div class="post-meta-col">' +
              '<div class="post-date">' + CMS.formatDate(post.date) + '</div>' +
              '<div class="post-read">' + (post.readMin || 5) + ' min read</div>' +
            '</div>' +
            '</a>';
        }).join('');
      }

      // Latest 3 projects
      var projects = CMS.getProjects().slice(0, 3);
      var projCont = document.getElementById('home-projects');
      if (!projects || projects.length === 0) {
        projCont.innerHTML = '<p style="color:var(--ink-faint);font-size:.9rem">No projects yet.</p>';
      } else {
        projCont.innerHTML = projects.map(function(proj) {
          var url = proj.url && proj.url !== '#' ? proj.url : '';
          var tags = (proj.tags || '').split(',').map(function(t){ return '<span class="tag">' + t.trim() + '</span>'; }).join('');
          return '<a class="project-card fade-in"' +
            ' href="' + (url || 'javascript:void(0)') + '"' +
            (url ? ' target="_blank" rel="noopener"' : '') + '>' +
            (proj.cover ? '<img class="project-cover" src="' + proj.cover + '" alt="' + proj.title + '">' : '') +
            '<h3 class="project-title">' + proj.title + '</h3>' +
            '<p class="project-desc">' + proj.desc + '</p>' +
            '<div class="project-tags">' + tags + '</div>' +
            (url ? '<span class="project-url">Visit project &#8594;</span>' : '') +
            '</a>';
        }).join('');
      }

      initScrollAnimations();
    });
  </script>
</body>
</html>
