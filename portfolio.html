<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Work</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="nav" id="main-nav"></nav>

  <div class="page">
    <div class="page-header">
      <p class="section-label">Portfolio</p>
      <h1>Projects & Work</h1>
    </div>
    <section class="section">
      <div class="section-wrap">
        <div class="projects-grid" id="projects-grid"></div>
      </div>
    </section>
  </div>

  <footer class="footer" id="main-footer"></footer>

  <script src="js/cms.js"></script>
  <script src="js/main.js"></script>
  <script>
    buildNav('portfolio');

    document.addEventListener('DOMContentLoaded', function () {
      var profile = CMS.getProfile();
      document.title = 'Work — ' + profile.name;

      var projects = CMS.getProjects();
      var grid = document.getElementById('projects-grid');

      if (!projects || projects.length === 0) {
        grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="icon">🗂️</div><p>No projects yet. Add one from <a href="admin.html" style="color:var(--accent)">Admin</a>.</p></div>';
        return;
      }

      grid.innerHTML = projects.map(function(proj) {
        var url = proj.url && proj.url !== '#' ? proj.url : '';
        var tag = (proj.tags || '').split(',').map(function(t){ return '<span class="tag">' + t.trim() + '</span>'; }).join('');
        return '<a class="project-card fade-in"' +
          ' href="' + (url || 'javascript:void(0)') + '"' +
          (url ? ' target="_blank" rel="noopener"' : '') + '>' +
          (proj.cover ? '<img class="project-cover" src="' + proj.cover + '" alt="' + proj.title + '">' : '') +
          '<h3 class="project-title">' + proj.title + '</h3>' +
          '<p class="project-desc">' + proj.desc + '</p>' +
          '<div class="project-tags">' + tag + '</div>' +
          (url ? '<span class="project-url">Visit project &#8594;</span>' : '') +
          '</a>';
      }).join('');

      initScrollAnimations();
    });
  </script>
</body>
</html>
