<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thoughts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="nav" id="main-nav"></nav>

  <div class="page">
    <div class="page-header">
      <p class="section-label fade-in">Writing</p>
      <h1>Thoughts & Essays</h1>
    </div>

    <section class="section">
      <div class="section-wrap">
        <!-- Filter tags -->
        <div id="tag-filters" style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:36px"></div>
        <div class="posts-list" id="posts-list"></div>
      </div>
    </section>
  </div>

  <footer class="footer" id="main-footer"></footer>

  <script src="js/cms.js"></script>
  <script src="js/main.js"></script>
  <script>
    buildNav('thoughts');

    document.addEventListener('DOMContentLoaded', () => {
      const profile = CMS.getProfile();
      document.title = 'Thoughts — ' + profile.name;

      let activeTag = 'All';
      const posts = CMS.getPosts();

      // Collect unique tags
      const tags = ['All', ...new Set(posts.map(p => p.tag).filter(Boolean))];
      const filtersCont = document.getElementById('tag-filters');
      filtersCont.innerHTML = tags.map(t => `
        <button onclick="filterBy('${t}')" id="tag-btn-${t}"
          style="padding:6px 16px;border-radius:100px;border:1px solid var(--border);
                 background:${t==='All'?'var(--ink)':'var(--paper-warm)'};
                 color:${t==='All'?'var(--paper)':'var(--ink-muted)'};
                 font-size:.8rem;font-weight:500;cursor:pointer;font-family:var(--sans);
                 transition:all .2s">
          ${t}
        </button>
      `).join('');

      window.filterBy = (tag) => {
        activeTag = tag;
        tags.forEach(t => {
          const btn = document.getElementById('tag-btn-' + t);
          if (!btn) return;
          btn.style.background = t === tag ? 'var(--ink)' : 'var(--paper-warm)';
          btn.style.color      = t === tag ? 'var(--paper)' : 'var(--ink-muted)';
        });
        renderPosts();
      };

      function renderPosts() {
        const filtered = activeTag === 'All'
          ? posts
          : posts.filter(p => p.tag === activeTag);

        const cont = document.getElementById('posts-list');
        if (filtered.length === 0) {
          cont.innerHTML = `
            <div class="empty-state">
              <div class="icon">✍️</div>
              <p>No posts yet. Add one from the <a href="admin.html" style="color:var(--accent)">CMS</a>.</p>
            </div>`;
          return;
        }
        cont.innerHTML = filtered.map(post => `
          <a class="post-card fade-in" href="post.html?id=${post.id}">
            <div>
              <span class="post-tag">${post.tag || ''}</span>
              <h3 class="post-title">${post.title}</h3>
              <p class="post-excerpt">${post.excerpt}</p>
            </div>
            <div class="post-meta-col">
              ${post.cover ? `<img class="post-cover-thumb" src="${post.cover}" alt="">` : ''}
              <div class="post-date">${CMS.formatDate(post.date)}</div>
              <div class="post-read">${post.readMin || 5} min read</div>
            </div>
          </a>
        `).join('');
        initScrollAnimations();
      }

      renderPosts();
    });
  </script>
</body>
</html>
